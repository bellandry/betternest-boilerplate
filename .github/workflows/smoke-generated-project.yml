name: Smoke (generated project)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - db: prisma-postgresql
            docker: true
            db-url: postgresql://postgres:postgres@localhost:5432/my_app?schema=public
            label: prisma-postgresql
          - db: drizzle-postgresql
            docker: true
            db-url: postgresql://postgres:postgres@localhost:5432/my_app?schema=public
            label: drizzle-postgresql
          - db: prisma-sqlite
            docker: false
            db-url: file:./data.db
            label: prisma-sqlite
          - db: drizzle-sqlite
            docker: false
            db-url: data.db
            label: drizzle-sqlite
    env:
      DATABASE_URL: ${{ matrix.db-url }}
      BETTER_AUTH_SECRET: ci-smoke-not-a-real-secret-0123456789abcdef
      WEB_URL: http://localhost:3000
      PORT: "4000"
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: pnpm

      - name: Install monorepo dependencies
        run: pnpm install --frozen-lockfile

      - name: Build the CLI
        run: pnpm cli:build

      - name: Scaffold a project (db=${{ matrix.db }})
        working-directory: ${{ runner.temp }}
        run: node "$GITHUB_WORKSPACE/packages/cli/dist/index.js" my-app --yes --db=${{ matrix.db }} --no-install --no-git

      - name: Install generated project dependencies
        working-directory: ${{ runner.temp }}/my-app
        run: pnpm install

      - name: Start Docker
        if: ${{ matrix.docker }}
        working-directory: ${{ runner.temp }}/my-app
        run: docker compose up -d postgres

      - name: Wait for Postgres
        if: ${{ matrix.docker }}
        run: |
          for i in $(seq 1 30); do
            if docker exec my-app-postgres pg_isready -U postgres >/dev/null 2>&1; then
              echo "Postgres ready"; exit 0
            fi
            echo "waiting for postgres ($i)..."; sleep 2
          done
          echo "Postgres did not become ready"; exit 1

      - name: Push database schema
        working-directory: ${{ runner.temp }}/my-app
        run: pnpm db:push

      - name: Build the generated project
        working-directory: ${{ runner.temp }}/my-app
        run: pnpm build

      - name: Boot the API and probe the session endpoint
        working-directory: ${{ runner.temp }}/my-app
        run: |
          pnpm --filter=api start &
          API_PID=$!
          trap "kill $API_PID 2>/dev/null || true" EXIT

          for i in $(seq 1 30); do
            if curl -s -o /dev/null "http://localhost:${PORT}/api/auth/get-session"; then
              break
            fi
            echo "waiting for api ($i)..."; sleep 2
          done

          CODE=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:${PORT}/api/auth/get-session")
          echo "GET /api/auth/get-session -> HTTP $CODE"
          if [ -z "$CODE" ] || [ "$CODE" -ge 500 ]; then
            echo "API returned a server error (or no response)"; exit 1
          fi
          echo "API booted and answered without a server error."
