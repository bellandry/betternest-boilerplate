name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    name: lint · build · pack (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (type-check)
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Generator unit tests (skipped cleanly if none)
        run: pnpm --filter=@repo/generator run test --if-present

      - name: Packaged CLI smoke test (real .tgz)
        run: pnpm test:pack

  # test:pack diffs against examples/mvp (prisma-postgresql). These jobs give
  # the other major combos the same build/lint coverage on every PR without a
  # database (the full boot is covered by the Smoke workflow on main).
  non-postgresql-build:
    name: ${{ matrix.db }} · generate · build · lint (no DB)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        db: [drizzle-postgresql, drizzle-sqlite, prisma-sqlite]
    env:
      DATABASE_URL: file:./data.db
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build the CLI
        run: pnpm cli:build

      - name: Scaffold a ${{ matrix.db }} project
        working-directory: ${{ runner.temp }}
        run: node "$GITHUB_WORKSPACE/packages/cli/dist/index.js" my-app --yes --db=${{ matrix.db }} --no-install --no-git

      - name: Install generated project dependencies
        working-directory: ${{ runner.temp }}/my-app
        run: pnpm install

      - name: Build (no database needed)
        working-directory: ${{ runner.temp }}/my-app
        run: pnpm build

      - name: Lint
        working-directory: ${{ runner.temp }}/my-app
        run: pnpm lint
