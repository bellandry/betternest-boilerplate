name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    name: lint · build · pack (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (type-check)
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Generator unit tests (skipped cleanly if none)
        run: pnpm --filter=@repo/generator run test --if-present

      - name: Packaged CLI smoke test (real .tgz)
        run: pnpm test:pack
