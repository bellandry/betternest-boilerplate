version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
    groups:
      next:
        patterns:
          - "next"
          - "@next/*"
          - "eslint-config-next"
      nestjs:
        patterns:
          - "@nestjs/*"
      better-auth:
        patterns:
          - "better-auth"
          - "better-auth-*"
      prisma:
        patterns:
          - "prisma"
          - "@prisma/*"
      dev-tooling:
        dependency-type: "development"
        patterns:
          - "*"
        exclude-patterns:
          - "next"
          - "@next/*"
          - "eslint-config-next"
          - "@nestjs/*"
          - "better-auth"
          - "better-auth-*"
          - "prisma"
          - "@prisma/*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci(deps)"
    groups:
      github-actions:
        patterns:
          - "*"
