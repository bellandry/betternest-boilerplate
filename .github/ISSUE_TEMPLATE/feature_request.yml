name: Feature request
description: Suggest a new capability or improvement (e.g. a new auth provider or database)
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve BetterNest Boilerplate! For open-ended ideas or
        questions, consider starting a
        [Discussion](https://github.com/bellandry/betternest-boilerplate/discussions)
        instead.

  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checklist
      options:
        - label: I searched existing issues and this has not been requested yet.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem does this solve? What are you trying to do that you currently can't?
      placeholder: "I'm always frustrated when ..."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the capability you'd like. If it's a new auth provider or database, name it.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or other approaches you've thought about.
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, references, or examples from other tools.
    validations:
      required: false
