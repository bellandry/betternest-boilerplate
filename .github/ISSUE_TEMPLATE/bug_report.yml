name: Bug report
description: Report a problem with the CLI, the generator, or a generated project
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! Please fill in as much
        detail as you can — reproduction details make fixes dramatically faster.

        > [!WARNING]
        > **Do not report security vulnerabilities here.** See our
        > [Security Policy](https://github.com/bellandry/betternest-boilerplate/security/policy)
        > and use "Report a vulnerability" in the Security tab instead.

  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checklist
      options:
        - label: I am using the latest version of `create-betternest-app`.
          required: true
        - label: I searched existing issues and this has not been reported yet.
          required: true

  - type: input
    id: cli-version
    attributes:
      label: CLI version
      description: "Output of `npm create betternest-app@latest -- --version`, or the version you ran."
      placeholder: "0.2.0"
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Where does the bug occur?
      options:
        - The CLI / generation process itself
        - A generated project (build/runtime)
        - Documentation
        - Not sure
    validations:
      required: true

  - type: dropdown
    id: database
    attributes:
      label: Database choice
      description: Which database did you select during generation?
      options:
        - prisma
        - drizzle
        - Not applicable
    validations:
      required: true

  - type: input
    id: auth-providers
    attributes:
      label: Auth providers selected
      description: Which auth methods did you enable during generation?
      placeholder: "email-password, google, github"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
        - WSL
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      description: "Output of `node --version`."
      placeholder: "v20.11.0"
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: The exact command(s) and steps that trigger the bug.
      placeholder: |
        1. Run `npm create betternest-app@latest my-app -- --db=prisma --auth=email-password,google`
        2. `cd my-app && pnpm install`
        3. `pnpm dev`
        4. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include full error output and stack traces if any.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, logs, package manager (pnpm/npm/yarn), or anything else relevant.
    validations:
      required: false
